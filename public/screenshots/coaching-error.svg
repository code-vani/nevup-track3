<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="240" fill="#08090c"/>
  <!-- card -->
  <rect x="16" y="16" width="768" height="208" rx="12" fill="#0e1117" stroke="#1e2535" stroke-width="1"/>
  <!-- header -->
  <text x="32" y="42" font-family="-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8eaf0">🧠  AI Coach</text>
  <!-- reconnecting banner -->
  <rect x="32" y="56" width="736" height="36" rx="6" fill="#2d0f16" stroke="rgba(255,77,106,0.2)" stroke-width="1"/>
  <text x="52" y="74" font-family="sans-serif" font-size="18">⚠</text>
  <text x="78" y="74" font-family="-apple-system,sans-serif" font-size="13" fill="#ff4d6a" font-weight="600">Connection lost</text>
  <text x="200" y="74" font-family="-apple-system,sans-serif" font-size="12" fill="#6b7590"> — Reconnecting in 4s (attempt 2/5)…</text>
  <rect x="670" y="62" width="84" height="24" rx="6" fill="#141820" stroke="#2d3a52" stroke-width="1"/>
  <text x="712" y="79" font-family="-apple-system,sans-serif" font-size="11" fill="#e8eaf0" text-anchor="middle">Retry now</text>
  <!-- partial content already rendered -->
  <rect x="32" y="106" width="736" height="1" fill="#1e2535"/>
  <text x="32" y="130" font-family="-apple-system,sans-serif" font-size="13" fill="#e8eaf0">Looking at your last 5 sessions, I can see a pattern emerging around</text>
  <text x="32" y="150" font-family="-apple-system,sans-serif" font-size="13" fill="#e8eaf0">your AAPL trades. After a losing position you've consistently</text>
  <!-- cursor blink indicator -->
  <rect x="32" y="164" width="2" height="16" fill="#4fffb0" opacity="0.7"/>
  <!-- backoff status -->
  <text x="32" y="210" font-family="monospace" font-size="11" fill="#3d4561">Exponential backoff: next attempt in 4s · max 30s</text>
</svg>
