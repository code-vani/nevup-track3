  <rect x="32" y="92" width="680" height="13" rx="3" fill="#141820"/>
  <rect x="32" y="113" width="580" height="13" rx="3" fill="#141820"/>
  <rect x="32" y="134" width="620" height="13" rx="3" fill="#141820"/>
  <rect x="32" y="155" width="420" height="13" rx="3" fill="#141820"/>
  <!-- spinning indicator -->
  <circle cx="48" cy="196" r="10" fill="none" stroke="#4fffb0" stroke-width="2" stroke-dasharray="20 14"/>
  <text x="68" y="200" font-family="-apple-system,sans-serif" font-size="12" fill="#6b7590">Waiting for coaching stream…</text>
</svg>
