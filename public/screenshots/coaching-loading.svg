<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="240" fill="#08090c"/>
  <!-- card -->
  <rect x="16" y="16" width="768" height="208" rx="12" fill="#0e1117" stroke="#1e2535" stroke-width="1"/>
  <!-- header row -->
  <circle cx="44" cy="38" r="14" fill="#141820"/>
  <rect x="66" y="30" width="120" height="14" rx="3" fill="#141820"/>
  <rect x="66" y="50" width="80" height="10" rx="3" fill="#1c2232"/>
  <!-- connecting badge top right -->
  <rect x="670" y="26" width="96" height="24" rx="12" fill="#141820" stroke="#1e2535" stroke-width="1"/>
  <circle cx="686" cy="38" r="4" fill="#4fffb0" fill-opacity="0.6"/>
