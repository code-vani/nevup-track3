<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="280" fill="#08090c"/>
  <!-- step bar -->
  <rect x="16" y="16" width="768" height="36" rx="8" fill="#0e1117" stroke="#1e2535" stroke-width="1"/>
  <circle cx="80" cy="34" r="10" fill="#0d3322"/>
  <text x="80" y="39" font-family="monospace" font-size="11" fill="#4fffb0" text-anchor="middle">1</text>
  <text x="100" y="38" font-family="-apple-system,sans-serif" font-size="12" fill="#4fffb0">Trade Replay</text>
  <!-- step connector -->
  <rect x="200" y="33" width="60" height="2" fill="#1e2535"/>
  <circle cx="290" cy="34" r="10" fill="#1c2232"/>
  <text x="290" y="39" font-family="monospace" font-size="11" fill="#6b7590" text-anchor="middle">2</text>
  <!-- empty trades card -->
  <rect x="16" y="64" width="768" height="196" rx="12" fill="#0e1117" stroke="#1e2535" stroke-width="1"/>
  <!-- title -->
  <text x="32" y="92" font-family="-apple-system,sans-serif" font-size="17" font-weight="700" fill="#e8eaf0">Trade Replay</text>
  <text x="32" y="112" font-family="-apple-system,sans-serif" font-size="13" fill="#6b7590">Review each trade from this session</text>
  <rect x="32" y="124" width="736" height="1" fill="#1e2535"/>
  <!-- empty -->
  <text x="400" y="178" font-size="36" text-anchor="middle" font-family="sans-serif">📭</text>
  <text x="400" y="208" font-family="-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8eaf0" text-anchor="middle">No trades in this session</text>
  <text x="400" y="228" font-family="-apple-system,sans-serif" font-size="13" fill="#6b7590" text-anchor="middle">Start trading to see your replay here.</text>
  <!-- next btn disabled -->
  <rect x="660" y="244" width="108" height="32" rx="8" fill="#0d3322" stroke="rgba(79,255,176,0.2)" stroke-width="1"/>
  <text x="714" y="265" font-family="-apple-system,sans-serif" font-size="13" fill="#4fffb0" text-anchor="middle">Next →</text>
</svg>
