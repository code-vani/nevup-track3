<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="280" fill="#08090c"/>
  <!-- step bar -->
  <rect x="16" y="16" width="768" height="36" rx="8" fill="#0e1117" stroke="#1e2535" stroke-width="1"/>
  <circle cx="80" cy="34" r="10" fill="#1c2232"/>
  <text x="80" y="39" font-family="monospace" font-size="11" fill="#6b7590" text-anchor="middle">1</text>
  <text x="100" y="38" font-family="-apple-system,sans-serif" font-size="12" fill="#3d4561">Trade Replay</text>
  <circle cx="280" cy="34" r="10" fill="#1c2232"/>
  <text x="280" y="39" font-family="monospace" font-size="11" fill="#6b7590" text-anchor="middle">2</text>
  <circle cx="450" cy="34" r="10" fill="#1c2232"/>
  <text x="450" y="39" font-family="monospace" font-size="11" fill="#6b7590" text-anchor="middle">3</text>
  <!-- error card -->
  <rect x="16" y="64" width="768" height="196" rx="12" fill="#0e1117" stroke="#1e2535" stroke-width="1"/>
  <!-- error icon -->
  <text x="400" y="132" font-size="40" text-anchor="middle" font-family="sans-serif">⚠️</text>
  <!-- title -->
  <text x="400" y="162" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="#ff4d6a" text-anchor="middle">Failed to load</text>
  <!-- message -->
  <text x="400" y="183" font-family="-apple-system,sans-serif" font-size="13" fill="#6b7590" text-anchor="middle">Session not found or API unreachable. Check Prism is running on :4010</text>
  <!-- retry btn -->
  <rect x="336" y="200" width="128" height="32" rx="6" fill="#141820" stroke="#2d3a52" stroke-width="1"/>
  <text x="400" y="221" font-family="-apple-system,sans-serif" font-size="13" fill="#e8eaf0" text-anchor="middle">↻  Try again</text>
</svg>
