<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" fill="#08090c"/>
  <!-- card -->
  <rect x="16" y="16" width="768" height="168" rx="12" fill="#0e1117" stroke="#1e2535" stroke-width="1"/>
  <!-- empty icon -->
  <text x="400" y="76" font-size="40" text-anchor="middle" font-family="sans-serif">📭</text>
  <!-- title -->
  <text x="400" y="106" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8eaf0" text-anchor="middle">No trading activity yet</text>
  <!-- message -->
  <text x="400" y="128" font-family="-apple-system,sans-serif" font-size="13" fill="#6b7590" text-anchor="middle">Complete your first session to start building your 90-day heatmap.</text>
  <!-- CTA button -->
  <rect x="318" y="144" width="164" height="28" rx="6" fill="#4fffb0"/>
  <text x="400" y="163" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#000" text-anchor="middle">Start a session</text>
</svg>
